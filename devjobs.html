<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dev jobs</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="devboard.css" />
  </head>
  <body>
    <!-- navbar-expand-lg= collapses nav to hamburger icon below 932px -->
    <!-- bg-white= background-white -->
    <nav class="navbar navbar-expand-lg bg-white border-bottom sticky-top">
      <div class="container">
        <a href="#" class="navbar-brand fw-bold"
          >Dev <span class="text-accent">Board</span></a
        >
        <!-- text-accent=custom class -->
        <!-- navbar-brand=> styles logo or site name and removes underline -->

        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#navMenu"
        >
          <span class="navbar-toggler-icon"></span>
        </button>
        <!-- navbar-toggler=> hamburger icon -->
        <!-- data-bs-toggle= tells bootstrap js toggle visibility -->
        <!-- data-bs-target= tells which element to show or hide -->

        <div class="collapse navbar-collapse" id="navMenu">
          <div class="ms-auto">
            <a href="#" class="btn btn-accent rounded-pill px-4 fw-semibold"
              >Post a Job</a
            >
          </div>
        </div>
      </div>
    </nav>
    <!-- end of navbar -->
    <header class="py-5 text-center page-header">
      <div class="container">
        <span
          class="badge rounded-pill bg-accent-subtle text-black-50 px-3 py-2 mb-3"
          >24 roles open</span
        >
        <h1 class="fw-bold display-6 mb-2">Find Your Next Role</h1>
        <p class="text-muted mb-0" style="max-width: 400px; margin: 0 auto">
          Curated Jobs for Developer
        </p>
      </div>
    </header>
    <!-- py-5=> padding top and bottom 3 rem -->
    <!-- page-header=> our custom class -->

    <!-- End of Header.............................. -->

    <section class="py-5">
      <div class="container">
        <div class="row g-4">
          <div class="col-md-4">
            <div class="card border-0 shadow-sm h-100 job-card">
              <div class="card-body d-flex flex-column gap-3 p-4">
                <div class="d-flex justify-content-between align-items-center">
                  <span class="fw-semibold text-muted small">Stripe</span>
                  <span
                    class="badge bg-success-subtle text-success rounded-pill"
                    >Remote</span
                  >
                </div>
                <h5 class="fw-semibold mb-0">Frontend Engineer</h5>
                <p class="text-muted small mb-0">$120k - $150k / year</p>
                <a
                  href="#"
                  class="btn btn-accent rounded-pill mt-auto w-100 fw-semibold"
                  >Apply Now</a
                >
              </div>
            </div>
            <!-- job-card= custom class and card= class for bootstrap card -->
          </div>
          <!-- end of card 1.................................................... -->
          <!-- col=column md=for screen of 768px or below 4= 4 of 12 columns -->
        </div>
        <!-- row=> display flex and g-4= sets the gap 1.5rem -->
      </div>
    </section>
  </body>
</html>
